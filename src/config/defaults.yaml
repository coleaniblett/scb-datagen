# SCB Datagen — Default Configuration
# Override via --config or CLI flags (--backend, --model, --count)

# LLM backend settings
llm:
  backend: ollama                    # ollama | openai | anthropic | gemini
  model: llama3.1:8b                # Default model per backend; override with --model
  base_url: http://localhost:11434   # Only used for Ollama
  temperature: 0.0                   # Deterministic generation
  seed: 42
  timeout: 600                       # Seconds per LLM call (large for big models)
  max_tokens: 4096

# Generation parameters
generation:
  batch_size: 10                     # Items per LLM call
  max_retries: 3                     # Retries per failed LLM call
  output_dir: data/raw
  domains:                           # Target domains for proposition diversity
    - pharmaceutical
    - financial
    - tech
    - environmental
    - automotive
    - food_safety
    - telecommunications
    - energy
    - manufacturing
    - government
  pressure_type_distribution:        # Target mix of pressure mechanisms
    role_based: 0.33
    directive_based: 0.34
    contextual: 0.33

# Validation thresholds
validation:
  quality_threshold: 0.7             # Minimum overall quality score (0.0–1.0)
  output_dir: data/validated

# Pipeline settings
pipeline:
  over_generation_ratio: 1.5         # Generate 1.5× target to account for filtering

# Checkpoint settings
checkpoint:
  enabled: true
  dir: data/checkpoints
  save_every: 10                     # Save checkpoint every N items (unused currently)

# Dataset ID settings
dataset:
  id_prefix: scb
  start_id: 1
  target_count: 500                  # Default target; override with --count
